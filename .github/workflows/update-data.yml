name: Update stock data

on:
  schedule:
    # 毎週日曜 00:00 UTC (月曜 09:00 JST)
    - cron: '0 0 * * 0'
  workflow_dispatch:
    inputs:
      mode:
        description: '実行モード'
        required: true
        default: 'prices'
        type: choice
        options:
          - prices
          - full
          - irbank

jobs:
  update:
    runs-on: ubuntu-latest
    timeout-minutes: 350  # GitHub Actions max 360分
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: scripts/requirements.txt

      - name: Install dependencies
        run: pip install -r scripts/requirements.txt

      - name: Update data (prices)
        if: github.event_name == 'schedule' || github.event.inputs.mode == 'prices'
        env:
          UPDATE_PRICES_ONLY: '1'
          JQUANTS_REFRESH_TOKEN: ${{ secrets.JQUANTS_REFRESH_TOKEN }}
        run: python scripts/update_data.py

      - name: Update data (full)
        if: github.event.inputs.mode == 'full'
        env:
          JQUANTS_REFRESH_TOKEN: ${{ secrets.JQUANTS_REFRESH_TOKEN }}
        run: python scripts/update_data.py

      - name: Update data (ir-bank enrich)
        if: github.event.inputs.mode == 'irbank'
        env:
          ENRICH_IRBANK: '1'
          JQUANTS_REFRESH_TOKEN: ${{ secrets.JQUANTS_REFRESH_TOKEN }}
        run: python scripts/update_data.py

      - name: Commit and push changes
        run: |
          git config --local user.name "github-actions[bot]"
          git config --local user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/
          if git diff --staged --quiet; then
            echo "変更なし"
          else
            git commit -m "chore: update stock data ($(date -u +%Y-%m-%d))"
            git push
          fi
